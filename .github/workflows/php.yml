name: FTP Deploy Aviskara

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: 🚀 Deploy website every commit
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📂 Sync files
        uses: ../public/
        with:
          server:  ftp.aviskara.id
          username: ${{ secrets.FTP_PUBLIC_USERNAME }}
          password: ${{ secrets.secrets.FTP_PUBLIC_PASSWORD }}
